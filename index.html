<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PamplonAI · Asistente Académico · Unipamplona</title>
    <meta name="description" content="Asistente académico inteligente de la Universidad de Pamplona">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div id="app">

        <!-- Sidebar -->
        <div id="sidebar-overlay"></div>
        <aside id="sidebar" class="mobile-hidden">
            <div class="sidebar-logo">
                <div class="logo-badge">UP</div>
                <span>PAMPLON-AI</span>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active">
                    <i class="fas fa-comment-alt"></i>
                    Asistente
                </button>
                <button class="nav-item" id="btn-theme">
                    <i class="fas fa-moon" id="theme-icon"></i>
                    Tema
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item" id="btn-clear">
                    <i class="fas fa-trash-alt"></i>
                    Nuevo chat
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="main">
            <header id="chat-header">
                <div class="bot-identity">
                    <button id="menu-toggle" class="header-btn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="bot-avatar" id="avatar-emoji">🎓</div>
                    <div class="bot-info">
                        <h1>PamplonAI</h1>
                        <div id="status-text">En línea · PamplonAI</div>
                    </div>
                </div>
            </header>

            <!-- VENTANA DE CHAT -->
            <div id="chat-window">
                <!-- Los mensajes se inyectan aquí -->
            </div>

            <!-- CHIPS DE SUGERENCIA -->
            <div id="suggestions-bar">
                <div id="suggestions-container"></div>
            </div>

            <!-- INPUT -->
            <div id="input-area">
                <div id="input-wrapper">
                    <input type="text" id="user-input" placeholder="Pregúntale a Pampi algo..." autocomplete="off"
                        maxlength="500" />
                    <button id="send-btn" aria-label="Enviar">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p id="input-hint">Presiona <kbd>Enter</kbd> para enviar</p>
            </div>

        </main>
    </div>

    <script src="pamplonai-v3.js"></script>
</body>

</html>
